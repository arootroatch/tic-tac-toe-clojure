name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  clojure-tests:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: DeLaGuardo/setup-clojure@13.1
        with:
          cli: latest

      - uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
          key: clojure-${{ hashFiles('deps.edn') }}
          restore-keys: clojure-

      - uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}

      - name: Install Playwright OS dependencies
        run: npx playwright install-deps

      - name: Run Clojure tests
        run: clojure -M:test:gui:spec

      - name: Run ClojureScript tests
        run: clojure -M:test:cljs once

  integration-tests:
    runs-on: ubuntu-22.04

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: DeLaGuardo/setup-clojure@13.1
        with:
          cli: latest

      - uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
          key: clojure-${{ hashFiles('deps.edn') }}
          restore-keys: clojure-

      - name: Create PostgreSQL role
        run: psql -h localhost -U postgres -c "CREATE ROLE runner WITH LOGIN SUPERUSER CREATEDB;"

      - name: Run integration tests
        run: clojure -M:test:gui:integration

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [clojure-tests]
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: DeLaGuardo/setup-clojure@13.1
        with:
          cli: latest

      - uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
          key: clojure-${{ hashFiles('deps.edn') }}
          restore-keys: clojure-

      - name: Clean previous ClojureScript build
        run: rm -rf resources/public/cljs

      - name: Build production ClojureScript
        run: clojure -M:test:cljs once
        env:
          C3_ENV: production

      - name: Build CSS
        run: clojure -M:test:css once

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel
        run: vercel deploy resources/public --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
